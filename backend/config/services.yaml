# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    placement_notify_email: 'ossamadghoughi2@gmail.com'
    contact_notify_email: 'ossamadghoughi2@gmail.com'
    mailer_from: 'clouddevfusion.academy@gmail.com'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # Charger les commandes console (app:create-admin, etc.)
    App\Command\:
        resource: '../src/Command/'
        tags: ['console.command']

    # Listeners (ex. SessionIdHeaderListener)
    App\EventListener\:
        resource: '../src/EventListener/'

    # Controllers (pour injection EntityManager etc.)
    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']
        exclude:
            - '../src/Controller/FileUploadController.php'

    App\Controller\FileUploadController:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags: ['controller.service_arguments']

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    
    App\Serializer\CourseDenormalizer:
        arguments:
            $normalizer: '@serializer.normalizer.object'
        tags:
            - { name: 'serializer.normalizer', priority: 100 }
    
    App\Serializer\CourseNormalizer:
        arguments:
            $normalizer: '@serializer.normalizer.object'
        tags:
            - { name: 'serializer.normalizer', priority: 100 }
    
    # ExamVoucherDenormalizer désactivé - utilisation de la sérialisation standard
    # App\Serializer\ExamVoucherDenormalizer:
    #     arguments:
    #         $normalizer: '@serializer.normalizer.object'
    #     tags:
    #         - { name: 'serializer.normalizer', priority: 100 }
    
    App\Serializer\CircularReferenceHandler:
        class: App\Serializer\CircularReferenceHandler
    
    # Enregistrer explicitement le CourseProcessor
    App\State\CourseProcessor:
        autowire: true
        autoconfigure: true
    
    # ExamVoucherProcessor désactivé - utilisation du processor standard
    # App\State\ExamVoucherProcessor:
    #     autowire: true
    #     autoconfigure: true
    
    # Security Handlers
    App\Security\LoginSuccessHandler:
        autowire: true
        autoconfigure: true
    
    App\Security\LoginFailureHandler:
        autowire: true
        autoconfigure: true
    
    App\Security\AccessDeniedHandler:
        autowire: true
        autoconfigure: true

    App\Security\ApiAuthenticationEntryPoint:
        autowire: true
        autoconfigure: true

    App\Service\PlacementTestResultNotificationService:
        arguments:
            $notifyEmail: '%placement_notify_email%'
            $fromEmail: '%mailer_from%'

    App\Service\ContactNotificationService:
        arguments:
            $notifyEmail: '%contact_notify_email%'
            $fromEmail: '%mailer_from%'