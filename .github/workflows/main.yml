name: Deploy New Version

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "intranet/backend/**"
      - "intranet/frontend/**"
      - ".htaccess"
      - ".github/workflows/main.yml"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      backend_deps: ${{ steps.filter.outputs.backend_deps }}
      frontend: ${{ steps.filter.outputs.frontend }}
      htaccess: ${{ steps.filter.outputs.htaccess }}
      intranet_backend: ${{ steps.filter.outputs.intranet_backend }}
      intranet_backend_deps: ${{ steps.filter.outputs.intranet_backend_deps }}
      intranet_frontend: ${{ steps.filter.outputs.intranet_frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            backend_deps:
              - 'backend/composer.lock'
              - 'backend/composer.json'
            frontend:
              - 'frontend/**'
            htaccess:
              - '.htaccess'
            intranet_backend:
              - 'intranet/backend/**'
            intranet_backend_deps:
              - 'intranet/backend/composer.lock'
              - 'intranet/backend/composer.json'
            intranet_frontend:
              - 'intranet/frontend/**'

  deploy-backend:
    name: Deploy Backend (Symfony)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5.4"
          tools: composer

      - name: Install lftp + curl
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp curl

      - name: Composer install (prod, no scripts)
        working-directory: backend
        run: |
          composer install \
            --no-dev \
            --prefer-dist \
            --no-interaction \
            --optimize-autoloader \
            --no-scripts

      - name: Prepare .env for deployment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_ALLOW_ORIGIN: ${{ secrets.CORS_ALLOW_ORIGIN }}
          APP_ENV: prod
          APP_DEBUG: "0"
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DEFAULT_URI: ${{ secrets.DEFAULT_URI }}
          MAILER_DSN: ${{ secrets.MAILER_DSN }}
        run: |
          cat > backend/.env << EOF
          APP_ENV=${APP_ENV}
          APP_DEBUG=${APP_DEBUG}
          APP_SECRET=${APP_SECRET}
          DATABASE_URL=${DATABASE_URL}
          CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN}
          DEFAULT_URI=${DEFAULT_URI}
          MAILER_DSN=${MAILER_DSN}
          EOF
          cat backend/.env

      - name: Upload backend files (including .env)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          BACKEND_REMOTE: ${{ secrets.BACKEND_REMOTE }}
        run: |
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          mkdir -fp ${BACKEND_REMOTE}
          cd ${BACKEND_REMOTE}          
          mirror -R --only-newer --verbose \
            --exclude-glob='.git*' \
            --exclude-glob='.env.local' \
            --exclude-glob='.env.*.local' \
            --exclude-glob='var/' \
            --exclude-glob='vendor/' \
            --exclude-glob='node_modules/' \
            --exclude-glob='*.log' \
            --exclude-glob='.DS_Store' \
            backend/ ./
          bye
          "

      - name: Upload vendor (only when deps changed)
        if: ${{ needs.changes.outputs.backend_deps == 'true' || github.event_name == 'workflow_dispatch' }}
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          BACKEND_REMOTE: ${{ secrets.BACKEND_REMOTE }}
        run: |
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          mkdir -fp ${BACKEND_REMOTE}/vendor
          cd ${BACKEND_REMOTE}/vendor
          mirror -R --only-newer --verbose \
            --exclude-glob='.git*' \
            backend/vendor/ ./
          bye
          "
          
      - name: Clear Symfony cache
        run: |
          sleep 2
          code="$(curl -s -o /dev/null -w "%{http_code}" "https://academy.clouddevfusion.com/backend/public/clear-cache-complete.php" || echo "000")"
          echo "Cache clear HTTP code: $code"
          sleep 2
          
      - name: Verify backend endpoint
        run: |
          code="$(curl -s -o /dev/null -w "%{http_code}" "https://academy.clouddevfusion.com/api/courses" || echo "000")"
          echo "HTTP_CODE=$code"
          if [ "$code" != "200" ] && [ "$code" != "401" ] && [ "$code" != "403" ]; then
            echo "Unexpected backend status: $code"
            exit 1
          fi

  deploy-intranet-backend:
    name: Deploy Intranet Backend (Symfony)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.intranet_backend == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5.4"
          tools: composer

      - name: Install lftp + curl
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp curl

      - name: Composer install (prod, no scripts)
        working-directory: intranet/backend
        run: |
          composer install \
            --no-dev \
            --prefer-dist \
            --no-interaction \
            --optimize-autoloader \
            --no-scripts

      - name: Prepare .env for deployment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_ALLOW_ORIGIN: ${{ secrets.CORS_ALLOW_ORIGIN }}
          APP_ENV: prod
          APP_DEBUG: "0"
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DEFAULT_URI: ${{ secrets.DEFAULT_URI }}
          MAILER_DSN: ${{ secrets.MAILER_DSN }}
        run: |
          cat > intranet/backend/.env << EOF
          APP_ENV=${APP_ENV}
          APP_DEBUG=${APP_DEBUG}
          APP_SECRET=${APP_SECRET}
          DATABASE_URL=${DATABASE_URL}
          CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN}
          DEFAULT_URI=${DEFAULT_URI}
          MAILER_DSN=${MAILER_DSN}
          EOF
          cat intranet/backend/.env

      - name: Upload intranet backend files (including .env)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          INTRANET_BACKEND_REMOTE: ${{ secrets.INTRANET_BACKEND_REMOTE }}
        run: |
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          set cmd:fail-exit no
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          mkdir -f ${INTRANET_BACKEND_REMOTE}
          cd ${INTRANET_BACKEND_REMOTE}
          mirror -R --only-newer --verbose \
            --exclude-glob='.git*' \
            --exclude-glob='.env.local' \
            --exclude-glob='.env.*.local' \
            --exclude-glob='var/' \
            --exclude-glob='vendor/' \
            --exclude-glob='node_modules/' \
            --exclude-glob='*.log' \
            --exclude-glob='.DS_Store' \
            intranet/backend/ ./
          bye
          "

      - name: Upload intranet backend vendor
        timeout-minutes: 40
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          INTRANET_BACKEND_REMOTE: ${{ secrets.INTRANET_BACKEND_REMOTE }}
        run: |
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 120
          set net:max-retries 5
          set cmd:fail-exit no
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          mkdir -f ${INTRANET_BACKEND_REMOTE}/vendor
          lcd intranet/backend/vendor
          cd ${INTRANET_BACKEND_REMOTE}/vendor
          mirror -R --only-newer --parallel=6 \
            --exclude-glob='.git*' \
            --exclude-glob='**/tests/**' \
            --exclude-glob='**/Tests/**' \
            . ./
          bye
          "

      - name: Upload root .htaccess
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          put .htaccess
          bye
          "

      - name: Upload intranet folder .htaccess (API routing)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          INTRANET_FRONTEND_REMOTE: ${{ secrets.INTRANET_FRONTEND_REMOTE }}
        run: |
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          mkdir -f ${INTRANET_FRONTEND_REMOTE}
          cd ${INTRANET_FRONTEND_REMOTE}
          put intranet/frontend/public/.htaccess -o .htaccess
          bye
          "

      - name: Queue intranet database migrations on production
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          INTRANET_BACKEND_REMOTE: ${{ secrets.INTRANET_BACKEND_REMOTE }}
        run: |
          date -u +%FT%TZ > /tmp/migrate.pending
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          set cmd:fail-exit no
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          cd ${INTRANET_BACKEND_REMOTE}
          mkdir -f var
          put /tmp/migrate.pending -o var/migrate.pending
          bye
          "

      - name: Clear Symfony cache
        run: |
          sleep 2
          code="$(curl -s -o /dev/null -w "%{http_code}" "https://academy.clouddevfusion.com/intranet/backend/public/clear-cache-complete.php" || echo "000")"
          echo "Cache clear HTTP code: $code"
          sleep 2

      - name: Verify intranet backend endpoint
        run: |
          HEALTH_URL="https://academy.clouddevfusion.com/intranet/api/health"
          FALLBACK_URL="https://academy.clouddevfusion.com/intranet/backend/public/index.php/intranet/api/health"
          for i in $(seq 1 10); do
            body="$(curl -fsS "$HEALTH_URL" 2>/dev/null || echo "FAIL")"
            echo "health attempt $i/10: $body"
            if echo "$body" | grep -qi '<html'; then
              echo "API rewrite not ready, trying direct Symfony URL..."
              body="$(curl -fsS "$FALLBACK_URL" 2>/dev/null || echo "FAIL")"
              echo "fallback: $body"
            fi
            if echo "$body" | grep -q '"ok"[[:space:]]*:[[:space:]]*true'; then
              echo "Intranet backend OK (pending migrations run on first Symfony boot)"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Intranet health check failed"
          exit 1

  deploy-frontend:
    name: Deploy Frontend (Angular)
    runs-on: ubuntu-latest
    needs: changes 
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install lftp + curl
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp curl

      - name: Install deps + build
        working-directory: frontend
        run: |
          npm ci
          npm run build
          test -d dist
          
      - name: Upload dist to FTP (delete removed files)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FRONTEND_REMOTE: ${{ secrets.FRONTEND_REMOTE }}
        run: |
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          mkdir -fp ${FRONTEND_REMOTE}
          cd ${FRONTEND_REMOTE}
          mirror -R --delete --only-newer --parallel=4 --verbose \
            --exclude-glob='.git*' \
            --exclude-glob='node_modules' \
            --exclude-glob='backend/' \
            --exclude-glob='intranet/' \
            --exclude-glob='.angular' \
            --exclude-glob='*.map' \
            --exclude-glob='*.htaccess' \
            frontend/dist/cloudacademy/browser/ ./
          bye
          "
      - name: Verify frontend (retry)
        run: |
          set -e

          URL="https://academy.clouddevfusion.com/home"
          MAX_RETRIES=20
          SLEEP_SECONDS=8

          echo "Waiting 15s before first frontend check..."
          sleep 15

          for i in $(seq 1 $MAX_RETRIES); do
            code="$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")"
            echo "Attempt $i/$MAX_RETRIES → HTTP $code"

            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
              echo "Frontend is up"
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Waiting ${SLEEP_SECONDS}s before retry..."
              sleep "$SLEEP_SECONDS"
            fi
          done

          echo "Frontend did not recover after ${MAX_RETRIES} attempts"
          exit 1

  deploy-intranet-frontend:
    name: Deploy Intranet Frontend (Angular)
    runs-on: ubuntu-latest
    needs: changes 
    if: ${{ needs.changes.outputs.intranet_frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: intranet/frontend/package-lock.json

      - name: Install lftp + curl
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp curl

      - name: Install deps + build
        working-directory: intranet/frontend
        run: |
          npm ci
          npm run build
          test -d dist
          
      - name: Upload dist to FTP (delete removed files)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          INTRANET_FRONTEND_REMOTE: ${{ secrets.INTRANET_FRONTEND_REMOTE }}
        run: |
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          mkdir -fp ${INTRANET_FRONTEND_REMOTE}
          cd ${INTRANET_FRONTEND_REMOTE}
          mirror -R --delete --only-newer --parallel=4 --verbose \
            --exclude-glob='.git*' \
            --exclude-glob='node_modules' \
            --exclude-glob='backend/' \
            --exclude-glob='.angular' \
            --exclude-glob='*.map' \
            --exclude-glob='*.htaccess' \
            intranet/frontend/dist/front/browser/ ./
          bye
          "
      - name: Verify intranet frontend (retry)
        run: |
          set -e

          URL="https://academy.clouddevfusion.com/intranet"
          MAX_RETRIES=10
          SLEEP_SECONDS=6

          for i in $(seq 1 $MAX_RETRIES); do
            code="$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")"
            echo "Attempt $i/$MAX_RETRIES → HTTP $code"

            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
              echo "Intranet frontend is up"
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Waiting ${SLEEP_SECONDS}s before retry..."
              sleep "$SLEEP_SECONDS"
            fi
          done

          echo "Intranet frontend did not recover after ${MAX_RETRIES} attempts"
          exit 1

  deploy-htaccess:
    name: Deploy .htaccess
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.htaccess == 'true' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Upload .htaccess global file
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          put .htaccess
          bye
          "

      - name: Verify upload
        run: |
          echo "Global .htaccess files deployed successfully"

  check-php-version:
    name: Check Server PHP Version
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-intranet-backend, deploy-frontend, deploy-intranet-frontend, deploy-htaccess]
    if: always()
    steps:
      - name: Fetch PHP version from server
        run: |
          VERSION=$(curl -s "https://academy.clouddevfusion.com/backend/public/version.php")
          echo "Server PHP version: $VERSION"