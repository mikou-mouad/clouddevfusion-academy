name: Deploy Intranet

on:
  push:
    branches: ["main"]
    paths:
      - "intranet/**"
      - ".github/workflows/intranet-deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-intranet-main
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      intranet_backend: ${{ steps.filter.outputs.intranet_backend }}
      intranet_backend_deps: ${{ steps.filter.outputs.intranet_backend_deps }}
      intranet_frontend: ${{ steps.filter.outputs.intranet_frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            intranet_backend:
              - 'intranet/backend/**'
            intranet_backend_deps:
              - 'intranet/backend/composer.lock'
              - 'intranet/backend/composer.json'
            intranet_frontend:
              - 'intranet/frontend/**'

  deploy-intranet-backend:
    name: Deploy Intranet Backend
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.intranet_backend == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Install lftp + curl
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp curl

      - name: Composer install (prod, no scripts)
        working-directory: intranet/backend
        run: |
          composer install \
            --no-dev \
            --prefer-dist \
            --no-interaction \
            --optimize-autoloader \
            --no-scripts

      - name: Prepare .env for intranet backend
        env:
          APP_ENV: prod
          APP_DEBUG: "0"
          APP_SECRET: ${{ secrets.INTRANET_APP_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_ALLOW_ORIGIN: ${{ secrets.CORS_ALLOW_ORIGIN }}
          INTRANET_LOGIN_URL: https://academy.clouddevfusion.com/intranet/
          DEFAULT_URI: https://academy.clouddevfusion.com/intranet
          MAILER_DSN: ${{ secrets.MAILER_DSN }}
        run: |
          {
            echo "APP_ENV=${APP_ENV}"
            echo "APP_DEBUG=${APP_DEBUG}"
            echo "APP_SECRET=${APP_SECRET}"
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN}"
            echo "DEFAULT_URI=${DEFAULT_URI}"
            echo "INTRANET_LOGIN_URL=${INTRANET_LOGIN_URL}"
            echo "MAILER_DSN=${MAILER_DSN}"
          } > intranet/backend/.env

      - name: Upload intranet backend files
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          INTRANET_BACKEND_REMOTE: ${{ secrets.INTRANET_BACKEND_REMOTE }}
        run: |
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          mkdir -p ${INTRANET_BACKEND_REMOTE}
          cd ${INTRANET_BACKEND_REMOTE}
          mirror -R --only-newer --verbose \
            --exclude-glob='.git*' \
            --exclude-glob='var/' \
            --exclude-glob='vendor/' \
            --exclude-glob='node_modules/' \
            --exclude-glob='*.log' \
            --exclude-glob='.DS_Store' \
            intranet/backend/ ./
          bye
          "

      - name: Upload intranet backend vendor
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          INTRANET_BACKEND_REMOTE: ${{ secrets.INTRANET_BACKEND_REMOTE }}
        run: |
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          mkdir -p ${INTRANET_BACKEND_REMOTE}/vendor
          cd ${INTRANET_BACKEND_REMOTE}/vendor
          mirror -R --only-newer --verbose \
            --exclude-glob='.git*' \
            intranet/backend/vendor/ ./
          bye
          "

      - name: Verify intranet backend health
        run: |
          body="$(curl -fsS "https://academy.clouddevfusion.com/intranet/api/health" || true)"
          echo "BODY=$body"
          echo "$body" | grep -q '"ok"[[:space:]]*:[[:space:]]*true'

  deploy-intranet-frontend:
    name: Deploy Intranet Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.intranet_frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: intranet/frontend/package-lock.json

      - name: Install lftp + curl
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp curl

      - name: Install deps + build intranet frontend
        working-directory: intranet/frontend
        run: |
          npm ci
          npm run build -- --configuration production
          test -d dist/front/browser

      - name: Upload intranet dist to FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          INTRANET_FRONTEND_REMOTE: ${{ secrets.INTRANET_FRONTEND_REMOTE }}
        run: |
          lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          open -p ${FTP_PORT} -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST}
          mkdir -p ${INTRANET_FRONTEND_REMOTE}
          cd ${INTRANET_FRONTEND_REMOTE}
          mirror -R --delete --only-newer --parallel=4 --verbose \
            --exclude-glob='.git*' \
            --exclude-glob='node_modules' \
            --exclude-glob='.angular' \
            --exclude-glob='*.map' \
            --exclude-glob='.DS_Store' \
            intranet/frontend/dist/front/browser/ ./
          bye
          "

      - name: Verify intranet frontend
        run: |
          code="$(curl -s -o /dev/null -w "%{http_code}" "https://academy.clouddevfusion.com/intranet/" || echo "000")"
          echo "HTTP_CODE=$code"
          if [ "$code" != "200" ] && [ "$code" != "301" ] && [ "$code" != "302" ]; then
            echo "Unexpected frontend status: $code"
            exit 1
          fi
